<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="pannellum.css"/>
  <script src="pannellum.js"></script>
  <style>
    html, body, #panorama {
      width:100%;
      height:100vh;
      margin:0;
    }
  </style>
</head>
<body>
<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {
  default: {
    firstScene: 'scene1',
    sceneFadeDuration: 1000
  },

  scenes: {

    scene1: {
      title: 'Entrée',
      panorama: 'P01.jpg',
      autoLoad: true,
      hotSpotDebug: true,
      hotSpots: [
        {
          pitch: -6,
          yaw: 28,
          type: 'scene',
          sceneId: 'scene2',
          text: 'Aller pièce 2'
        }
      ]
    },

    scene2: {
      title: 'Salle',
      panorama: 'P02.jpg',
      autoLoad: true,
      hotSpotDebug: true,
      hotSpots: [
        {
          pitch: -6,
          yaw: -59,
          type: 'scene',
          sceneId: 'scene1',
          text: 'Retour pièce 1'
        },
        {
          pitch: -8,
          yaw: 40,
          type: 'scene',
          sceneId: 'scene3',
          text: 'Aller pièce 3'
        }
      ]
    },

    scene3: {
      title: 'Pièce 3',
      panorama: 'P03.jpg',
      autoLoad: true,
      hotSpotDebug: true,
      hotSpots: [
        {
          pitch: -5,
          yaw: 180,
          type: 'scene',
          sceneId: 'scene2',
          text: 'Retour salle'
        }
      ]
    }

  }
});
</script>

</body>
</html>
