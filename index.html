<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="pannellum.css">
  <script src="pannellum.js"></script>

  <style>
    html,
    body,
    #panorama {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    #panorama {
      height: 100vh;
    }
  </style>
</head>

<body>

  <div id="panorama"></div>

  <script>
    pannellum.viewer("panorama", {
      default: {
        firstScene: "scene1",
        sceneFadeDuration: 1000,
        autoLoad: true
      },

      scenes: {
        scene1: {
          title: "Entrée",
          panorama: "P01.jpg",
          hotSpotDebug: true,

          hotSpots: [
            {
              pitch: -6,
              yaw: 28,
              type: "scene",
              sceneId: "scene2",
              text: "Aller à la pièce 2"
            }
          ]
        },

        scene2: {
          title: "Salle",
          panorama: "P02.jpg",
          hotSpotDebug: true,

          hotSpots: [
            {
              pitch: -5,
              yaw: -59,
              type: "scene",
              sceneId: "scene1",
              text: "Retour à la pièce 1"
            },
            {
              pitch: -5,
              yaw: 59,
              type: "scene",
              sceneId: "scene3",
              text: "Aller à la pièce 3"
            }
          ]
        },

        scene3: {
          title: "Pièce 3",
          panorama: "P03.jpg",
          hotSpotDebug: true,

          hotSpots: [
            {
              pitch: -5,
              yaw: 180,
              type: "scene",
              sceneId: "scene2",
              text: "Retour à la pièce 2"
            }
          ]
        }
      }
    });
  </script>

</body>
</html>
